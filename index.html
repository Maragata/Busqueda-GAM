        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; text-align: left; }
        .card { background: white; padding: 20px; border-radius: 12px; border-left: 5px solid var(--red); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .ce-box { background: #fff5f6; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 0.85rem; }
